name: Build and Release

on:
  push:
    tags:
      - 'v*' # Dispara quando você cria uma tag como v0.5.0
  workflow_dispatch: # Permite rodar manualmente pela aba Actions

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MinGW (Manual via Chocolatey)
        shell: pwsh
        run: |
          choco install mingw --version 15.2.0 -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        # Forçamos o gerador MinGW para bater com seu CMakeLists.txt que exige gcc/g++
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          cmake --build build --config Release

      - name: Prepare Artifacts
        # Organiza apenas o executável e a pasta de recursos para o ZIP
        run: |
          mkdir release_pkg
          cp bin/R2NESV2.exe release_pkg/
          cp -r bin/resources release_pkg/
          
      - name: Create Zip
        shell: pwsh
        run: |
          Compress-Archive -Path release_pkg/* -DestinationPath R2NES_Windows_x64.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: R2NES_Windows_x64.zip
          body: |
            Build automática gerada pelo GitHub Actions.
            
            **Mudanças nesta versão:**
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}